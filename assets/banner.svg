<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Birthday Reminder Bot — Lumen banner</title>
  <desc id="desc">A compact dark cosmic banner with clean typography, orbital lines, soft violet-blue glow, and a minimal brand mark.</desc>
  <defs>
    <linearGradient id="bg" x1="112" y1="20" x2="1168" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1022"/>
      <stop offset="0.55" stop-color="#151936"/>
      <stop offset="1" stop-color="#090B18"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(212 132) rotate(32) scale(240 170)">
      <stop stop-color="#7C5CFF" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1092 214) rotate(145) scale(250 170)">
      <stop stop-color="#3AB8FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3AB8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="304" y1="76" x2="1148" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A58CFF"/>
      <stop offset="0.55" stop-color="#79AFFF"/>
      <stop offset="1" stop-color="#BDF5FF"/>
    </linearGradient>
    <linearGradient id="iconStroke" x1="898" y1="118" x2="1102" y2="298" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A58CFF"/>
      <stop offset="0.55" stop-color="#79AFFF"/>
      <stop offset="1" stop-color="#D6FAFF"/>
    </linearGradient>
    <radialGradient id="iconCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 206) rotate(90) scale(90)">
      <stop stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="0.35" stop-color="#BDF5FF" stop-opacity="0.95"/>
      <stop offset="0.7" stop-color="#8AA8FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8AA8FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurGlow" x="0" y="0" width="1280" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <ellipse cx="212" cy="132" rx="240" ry="170" fill="url(#glowLeft)" filter="url(#blurGlow)"/>
  <ellipse cx="1040" cy="214" rx="250" ry="170" fill="url(#glowRight)" filter="url(#blurGlow)"/>

  <g opacity="0.68">
    <circle cx="152" cy="88" r="2.4" fill="#D7DFFF"/>
    <circle cx="1106" cy="90" r="2" fill="#B8E8FF"/>
    <circle cx="1138" cy="132" r="1.6" fill="#FFFFFF"/>
    <circle cx="210" cy="334" r="1.5" fill="#FFFFFF"/>
    <circle cx="1090" cy="340" r="2.5" fill="#D9CBFF"/>
    <circle cx="328" cy="358" r="2" fill="#B8E8FF"/>
  </g>

  <g opacity="0.28">
    <ellipse cx="1094" cy="142" rx="156" ry="60" transform="rotate(-15 1018 142)" stroke="url(#accent)" stroke-width="2"/>
    <ellipse cx="1058" cy="174" rx="228" ry="96" transform="rotate(-15 982 174)" stroke="url(#accent)" stroke-width="1.5"/>
    <ellipse cx="1124" cy="286" rx="176" ry="70" transform="rotate(12 1048 286)" stroke="url(#accent)" stroke-width="2"/>
    <path d="M860 330C930 294 1015 274 1140 270" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  </g>

  <g>
    <text x="96" y="154" fill="#8EA4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3.2">
      TELEGRAM-FIRST REMINDER ASSISTANT
    </text>

    <text x="96" y="222" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.3">
      Birthday Reminder Bot — Lumen
    </text>

    <text x="96" y="268" fill="#BFC8E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">
      A calm assistant for remembering important birthdays and important dates
    </text>
  </g>

  <g>
    <circle cx="1106" cy="206" r="76" fill="url(#iconCore)" opacity="0.9"/>
    <circle cx="1106" cy="206" r="18" fill="#FFFFFF" opacity="0.96"/>
    <circle cx="1106" cy="206" r="46" stroke="url(#iconStroke)" stroke-width="2.5" opacity="0.82"/>
    <ellipse cx="1106" cy="206" rx="102" ry="40" transform="rotate(-18 1000 206)" stroke="url(#iconStroke)" stroke-width="2.5" opacity="0.92"/>
    <circle cx="1198" cy="174" r="6" fill="#BDF5FF"/>
    <path d="M1038 116L1044 130L1058 136L1044 142L1038 156L1032 142L1018 136L1032 130L1038 116Z" fill="#FFFFFF" opacity="0.95"/>
  </g>
</svg>
