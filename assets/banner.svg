<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Birthday Reminder Bot — Lumen</title>
  <desc id="desc">A dark cosmic banner with soft violet and blue glow for Birthday Reminder Bot — Lumen.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="40" x2="1120" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1022"/>
      <stop offset="0.5" stop-color="#151936"/>
      <stop offset="1" stop-color="#090B18"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 180) rotate(39) scale(280 240)">
      <stop stop-color="#7C5CFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 420) rotate(132) scale(250 220)">
      <stop stop-color="#3AB8FF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#3AB8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="322" y1="146" x2="980" y2="522" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A58CFF"/>
      <stop offset="0.5" stop-color="#79AFFF"/>
      <stop offset="1" stop-color="#BDF5FF"/>
    </linearGradient>
    <filter id="blurGlow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <ellipse cx="250" cy="180" rx="280" ry="240" fill="url(#glowLeft)" filter="url(#blurGlow)"/>
  <ellipse cx="1030" cy="420" rx="250" ry="220" fill="url(#glowRight)" filter="url(#blurGlow)"/>

  <g opacity="0.7">
    <circle cx="164" cy="126" r="2.5" fill="#D7DFFF"/>
    <circle cx="1088" cy="122" r="2" fill="#B8E8FF"/>
    <circle cx="1132" cy="166" r="1.5" fill="#FFFFFF"/>
    <circle cx="182" cy="472" r="1.5" fill="#FFFFFF"/>
    <circle cx="1016" cy="502" r="2.5" fill="#D9CBFF"/>
    <circle cx="926" cy="116" r="1.5" fill="#FFFFFF"/>
    <circle cx="296" cy="538" r="2" fill="#B8E8FF"/>
  </g>

  <g opacity="0.34">
    <ellipse cx="979" cy="196" rx="168" ry="72" transform="rotate(-19 979 196)" stroke="url(#accent)" stroke-width="2"/>
    <ellipse cx="944" cy="224" rx="236" ry="118" transform="rotate(-19 944 224)" stroke="url(#accent)" stroke-width="1.5"/>
    <ellipse cx="1036" cy="436" rx="182" ry="84" transform="rotate(14 1036 436)" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="1018" cy="332" r="86" fill="#12162E" stroke="rgba(189,245,255,0.18)" stroke-width="2"/>
    <rect x="958" y="278" width="120" height="112" rx="48" fill="#181D38"/>
    <rect x="978" y="300" width="80" height="68" rx="28" fill="#0C1020"/>
    <circle cx="1004" cy="333" r="9" fill="#BDF5FF"/>
    <circle cx="1032" cy="333" r="9" fill="#BDF5FF"/>
    <path d="M1000 355C1008 362 1028 362 1036 355" stroke="#BDF5FF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="952" cy="332" r="12" fill="#1E2446"/>
    <circle cx="1084" cy="332" r="12" fill="#1E2446"/>
    <rect x="988" y="394" width="60" height="76" rx="26" fill="#171C36"/>
    <rect x="948" y="404" width="40" height="16" rx="8" fill="#1C2142"/>
    <rect x="1048" y="404" width="40" height="16" rx="8" fill="#1C2142"/>
    <rect x="995" y="466" width="14" height="56" rx="7" fill="#1E2446"/>
    <rect x="1027" y="466" width="14" height="56" rx="7" fill="#1E2446"/>
    <circle cx="1018" cy="428" r="10" fill="url(#accent)"/>
  </g>

  <g>
    <text x="96" y="236" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5">
      Birthday Reminder Bot — Lumen
    </text>
    <text x="96" y="292" fill="#BFC8E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
      A calm Telegram assistant for remembering important birthdays and important dates
    </text>
  </g>

  <g opacity="0.88">
    <rect x="96" y="360" width="208" height="54" rx="27" fill="rgba(255,255,255,0.06)" stroke="rgba(189,245,255,0.18)"/>
    <circle cx="129" cy="387" r="8" fill="#BDF5FF"/>
    <text x="150" y="396" fill="#EAF3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Telegram-first</text>

    <rect x="320" y="360" width="220" height="54" rx="27" fill="rgba(255,255,255,0.06)" stroke="rgba(165,140,255,0.2)"/>
    <circle cx="353" cy="387" r="8" fill="#A58CFF"/>
    <text x="374" y="396" fill="#EAF3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Birthday reminders</text>

    <rect x="556" y="360" width="184" height="54" rx="27" fill="rgba(255,255,255,0.06)" stroke="rgba(121,175,255,0.2)"/>
    <circle cx="589" cy="387" r="8" fill="#79AFFF"/>
    <text x="610" y="396" fill="#EAF3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Calm UX</text>
  </g>
</svg>
