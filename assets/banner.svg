<svg width="1280" height="420" viewBox="0 0 1280 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Birthday Reminder Bot — Lumen</title>
  <desc id="desc">Branded banner. Left side: a small eyebrow label, the wordmark "Lumen", a short tagline and a stack line. Right side: a Telegram-style chat bubble with a glowing candle inside, surrounded by sparkles and confetti dots.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0D1F"/>
      <stop offset="0.5" stop-color="#141938"/>
      <stop offset="1" stop-color="#070912"/>
    </linearGradient>

    <radialGradient id="auraLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 110) scale(380 280)">
      <stop stop-color="#7C5CFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 230) scale(380 280)">
      <stop stop-color="#3AB8FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#3AB8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraBottom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 460) scale(540 220)">
      <stop stop-color="#FF7AB6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FF7AB6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A58CFF"/>
      <stop offset="0.5" stop-color="#79AFFF"/>
      <stop offset="1" stop-color="#BDF5FF"/>
    </linearGradient>

    <linearGradient id="wordmark" x1="96" y1="170" x2="640" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#D9E1FF"/>
      <stop offset="1" stop-color="#A58CFF"/>
    </linearGradient>

    <linearGradient id="bubbleFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1F2752"/>
      <stop offset="1" stop-color="#161A38"/>
    </linearGradient>
    <linearGradient id="bubbleStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A58CFF" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#79AFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#BDF5FF" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="bubbleGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 200) scale(280 240)">
      <stop offset="0" stop-color="#A58CFF" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#79AFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#79AFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="candleBody" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F4ECFF"/>
      <stop offset="1" stop-color="#C8B8F2"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFE9A8"/>
      <stop offset="0.55" stop-color="#FFB36A"/>
      <stop offset="1" stop-color="#FF6E9A"/>
    </linearGradient>
    <radialGradient id="flameAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 178) scale(80 110)">
      <stop offset="0" stop-color="#FFE9A8" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#FFB36A" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FFB36A" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="haloGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#auraLeft)"/>
  <rect width="1280" height="420" rx="28" fill="url(#auraRight)"/>
  <rect width="1280" height="420" rx="28" fill="url(#auraBottom)"/>

  <!-- starfield -->
  <g fill="#FFFFFF">
    <circle cx="84" cy="58" r="1.4" opacity="0.85"/>
    <circle cx="220" cy="88" r="1.1" opacity="0.7"/>
    <circle cx="368" cy="46" r="1.6" opacity="0.9"/>
    <circle cx="510" cy="102" r="1" opacity="0.6"/>
    <circle cx="142" cy="350" r="1.3" opacity="0.75"/>
    <circle cx="44" cy="240" r="1" opacity="0.55"/>
    <circle cx="296" cy="362" r="1.5" opacity="0.85"/>
    <circle cx="612" cy="58" r="1" opacity="0.55"/>
    <circle cx="780" cy="78" r="1.3" opacity="0.75"/>
    <circle cx="1244" cy="296" r="1.4" opacity="0.8"/>
    <circle cx="852" cy="358" r="1.1" opacity="0.6"/>
  </g>
  <g fill="#BDF5FF" opacity="0.85">
    <circle cx="200" cy="180" r="1.1"/>
    <circle cx="700" cy="148" r="1.3"/>
  </g>

  <!-- bubble halo -->
  <ellipse cx="1040" cy="210" rx="220" ry="190" fill="url(#bubbleGlow)" filter="url(#haloGlow)"/>

  <!-- chat bubble (Telegram-style with tail) -->
  <g>
    <!-- bubble body -->
    <path d="
      M 950 96
      H 1130
      a 36 36 0 0 1 36 36
      V 268
      a 36 36 0 0 1 -36 36
      H 994
      L 968 332
      C 974 320 974 312 974 304
      H 950
      a 36 36 0 0 1 -36 -36
      V 132
      a 36 36 0 0 1 36 -36
      Z"
      fill="url(#bubbleFill)"
      stroke="url(#bubbleStroke)"
      stroke-width="1.6"
    />

    <!-- subtle inner highlight -->
    <path d="M 950 100 H 1130 a 32 32 0 0 1 32 32 V 138"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  </g>

  <!-- candle + flame inside the bubble -->
  <g>
    <!-- flame aura -->
    <ellipse cx="1040" cy="178" rx="72" ry="100" fill="url(#flameAura)" filter="url(#softGlow)"/>

    <!-- wick -->
    <rect x="1038.5" y="168" width="3" height="14" rx="1.2" fill="#3A2D1A"/>

    <!-- flame -->
    <path d="
      M 1040 132
      C 1054 152 1062 168 1058 184
      C 1054 200 1024 200 1022 184
      C 1018 168 1026 152 1040 132
      Z"
      fill="url(#flame)"
    />
    <!-- flame inner glow -->
    <path d="
      M 1040 154
      C 1046 164 1050 174 1047 184
      C 1044 192 1034 192 1033 184
      C 1031 174 1034 164 1040 154
      Z"
      fill="#FFF5DC" opacity="0.85"
    />

    <!-- candle body -->
    <rect x="1018" y="184" width="44" height="86" rx="6" fill="url(#candleBody)"/>
    <!-- candle stripes -->
    <rect x="1018" y="184" width="44" height="3" fill="#A58CFF" opacity="0.55"/>
    <rect x="1018" y="200" width="44" height="2" fill="#A58CFF" opacity="0.18"/>
    <rect x="1018" y="222" width="44" height="2" fill="#A58CFF" opacity="0.18"/>
    <rect x="1018" y="244" width="44" height="2" fill="#A58CFF" opacity="0.18"/>
    <!-- candle shine -->
    <rect x="1022" y="190" width="4" height="74" rx="2" fill="#FFFFFF" opacity="0.35"/>

    <!-- candle base plate -->
    <rect x="1010" y="266" width="60" height="6" rx="3" fill="#A58CFF" opacity="0.65"/>
    <rect x="1004" y="270" width="72" height="4" rx="2" fill="#79AFFF" opacity="0.35"/>
  </g>

  <!-- sparkles around the bubble -->
  <g opacity="0.95">
    <path d="M 880 80 L 884 92 L 896 96 L 884 100 L 880 112 L 876 100 L 864 96 L 876 92 Z" fill="#FFFFFF"/>
    <path d="M 1196 124 L 1198.5 131 L 1206 134 L 1198.5 136.5 L 1196 144 L 1193.5 136.5 L 1186 134 L 1193.5 131 Z" fill="#BDF5FF"/>
    <path d="M 906 304 L 908 310 L 914 312 L 908 314 L 906 320 L 904 314 L 898 312 L 904 310 Z" fill="#D9E1FF" opacity="0.9"/>
  </g>

  <!-- confetti dots -->
  <g>
    <circle cx="846" cy="184" r="3.4" fill="#FF7AB6"/>
    <circle cx="838" cy="246" r="2.6" fill="#79AFFF"/>
    <circle cx="868" cy="328" r="3" fill="#FFE9A8"/>
    <circle cx="1212" cy="234" r="3.4" fill="#A58CFF"/>
    <circle cx="1230" cy="308" r="2.6" fill="#BDF5FF"/>
    <circle cx="1166" cy="358" r="3" fill="#FF7AB6" opacity="0.9"/>
    <rect x="1196" y="78" width="6" height="6" rx="1.5" fill="#79AFFF" transform="rotate(20 1199 81)"/>
    <rect x="826" y="120" width="6" height="6" rx="1.5" fill="#A58CFF" transform="rotate(-15 829 123)"/>
  </g>

  <!-- text block -->
  <g font-family="Inter, 'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
    <!-- eyebrow -->
    <g transform="translate(96 110)">
      <rect x="0" y="-12" width="14" height="2" rx="1" fill="url(#accent)"/>
      <text x="24" y="-4" fill="#9EB1FF" font-size="13" font-weight="700" letter-spacing="3.4">
        BIRTHDAY · REMINDER · BOT
      </text>
    </g>

    <!-- wordmark -->
    <text x="96" y="232" fill="url(#wordmark)" font-size="148" font-weight="800" letter-spacing="-3">
      Lumen
    </text>

    <!-- short divider -->
    <rect x="96" y="252" width="56" height="3" rx="1.5" fill="url(#accent)" opacity="0.9"/>

    <!-- tagline -->
    <text x="96" y="296" fill="#E5E9FF" font-size="22" font-weight="600">
      A calm Telegram-first assistant
    </text>
    <text x="96" y="324" fill="#BFC8E8" font-size="18" font-weight="500">
      for remembering the birthdays that matter.
    </text>

    <!-- stack line -->
    <g transform="translate(96 366)" font-size="12" font-weight="700" letter-spacing="2.2" fill="#9EB1FF">
      <circle cx="3" cy="-3" r="3" fill="#A58CFF"/>
      <text x="14" y="0">TYPESCRIPT</text>
      <text x="120" y="0" fill="#3A3F70">·</text>
      <text x="134" y="0">GRAMMY</text>
      <text x="210" y="0" fill="#3A3F70">·</text>
      <text x="224" y="0">PRISMA</text>
      <text x="296" y="0" fill="#3A3F70">·</text>
      <text x="310" y="0">POSTGRES</text>
      <text x="404" y="0" fill="#3A3F70">·</text>
      <text x="418" y="0">DKRON</text>
    </g>
  </g>
</svg>
