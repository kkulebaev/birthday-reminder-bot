<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Birthday Reminder Bot — Lumen banner</title>
  <desc id="desc">A compact dark cosmic banner with a soft glowing robot mascot for Birthday Reminder Bot — Lumen.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="20" x2="1140" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1022"/>
      <stop offset="0.5" stop-color="#151936"/>
      <stop offset="1" stop-color="#090B18"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 132) rotate(36) scale(250 190)">
      <stop stop-color="#7C5CFF" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1055 272) rotate(132) scale(220 170)">
      <stop stop-color="#3AB8FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#3AB8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="280" y1="84" x2="992" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A58CFF"/>
      <stop offset="0.55" stop-color="#79AFFF"/>
      <stop offset="1" stop-color="#BDF5FF"/>
    </linearGradient>
    <filter id="blurGlow" x="0" y="0" width="1280" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1280" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <ellipse cx="220" cy="132" rx="250" ry="190" fill="url(#glowLeft)" filter="url(#blurGlow)"/>
  <ellipse cx="1055" cy="272" rx="220" ry="170" fill="url(#glowRight)" filter="url(#blurGlow)"/>

  <g opacity="0.75">
    <circle cx="144" cy="90" r="2.4" fill="#D7DFFF"/>
    <circle cx="1088" cy="86" r="2" fill="#B8E8FF"/>
    <circle cx="1136" cy="124" r="1.6" fill="#FFFFFF"/>
    <circle cx="184" cy="322" r="1.5" fill="#FFFFFF"/>
    <circle cx="1010" cy="334" r="2.5" fill="#D9CBFF"/>
    <circle cx="296" cy="356" r="2" fill="#B8E8FF"/>
  </g>

  <g opacity="0.3">
    <ellipse cx="980" cy="146" rx="150" ry="58" transform="rotate(-16 980 146)" stroke="url(#accent)" stroke-width="2"/>
    <ellipse cx="948" cy="170" rx="216" ry="92" transform="rotate(-16 948 170)" stroke="url(#accent)" stroke-width="1.5"/>
    <ellipse cx="1042" cy="296" rx="160" ry="64" transform="rotate(14 1042 296)" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <g>
    <text x="86" y="170" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1.2">
      Birthday Reminder Bot — Lumen
    </text>
    <text x="86" y="218" fill="#BFC8E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">
      A calm Telegram assistant for remembering important birthdays and important dates
    </text>
  </g>

  <g opacity="0.9">
    <rect x="86" y="274" width="182" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(189,245,255,0.18)"/>
    <circle cx="116" cy="298" r="7" fill="#BDF5FF"/>
    <text x="136" y="306" fill="#EAF3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Telegram-first</text>

    <rect x="284" y="274" width="208" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(165,140,255,0.2)"/>
    <circle cx="314" cy="298" r="7" fill="#A58CFF"/>
    <text x="334" y="306" fill="#EAF3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Birthday reminders</text>

    <rect x="508" y="274" width="142" height="48" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(121,175,255,0.2)"/>
    <circle cx="538" cy="298" r="7" fill="#79AFFF"/>
    <text x="558" y="306" fill="#EAF3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Calm UX</text>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="1032" cy="214" r="70" fill="#12162E" stroke="rgba(189,245,255,0.18)" stroke-width="2"/>
    <rect x="982" y="170" width="100" height="96" rx="40" fill="#181D38"/>
    <rect x="998" y="188" width="68" height="58" rx="24" fill="#0C1020"/>
    <circle cx="1020" cy="216" r="8" fill="#BDF5FF"/>
    <circle cx="1044" cy="216" r="8" fill="#BDF5FF"/>
    <path d="M1016 234C1022 240 1042 240 1048 234" stroke="#BDF5FF" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="978" cy="214" r="10" fill="#1E2446"/>
    <circle cx="1086" cy="214" r="10" fill="#1E2446"/>
    <rect x="1004" y="270" width="56" height="64" rx="24" fill="#171C36"/>
    <rect x="968" y="282" width="34" height="14" rx="7" fill="#1C2142"/>
    <rect x="1062" y="282" width="34" height="14" rx="7" fill="#1C2142"/>
    <rect x="1010" y="330" width="12" height="44" rx="6" fill="#1E2446"/>
    <rect x="1042" y="330" width="12" height="44" rx="6" fill="#1E2446"/>
    <circle cx="1032" cy="300" r="9" fill="url(#accent)"/>
  </g>
</svg>
